<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GeoCaptura Campo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #f59e0b;
    --text: #e8eaf0;
    --muted: #8b90a0;
    --border: rgba(255,255,255,0.08);
    --success: #22c55e;
    --danger: #ef4444;
    --radius: 12px;
    --mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; overflow-x: hidden; }

  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  #header h1 { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; }
  #db-status {
    margin-left: auto;
    font-size: 11px;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #db-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  #db-dot.on { background: var(--success); }
  #db-dot.err { background: var(--danger); }

  #map { width: 100%; height: 55vh; min-height: 280px; z-index: 1; }

  .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }

  #panel { background: var(--bg); padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .gps-status {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    font-size: 12px; font-family: var(--mono); color: var(--muted); min-height: 44px;
  }
  .gps-status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .gps-status.active .dot { background: var(--success); animation: pulse 1.5s infinite; }
  .gps-status.error .dot { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .coords-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .coord-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
  }
  .coord-box label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--mono); }
  .coord-box span { color: var(--accent); font-weight: 600; font-family: var(--mono); font-size: 13px; }

  input[type=text], textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); padding: 12px 14px;
    font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  input[type=text]:focus, textarea:focus { border-color: var(--accent); }
  input[type=text]::placeholder, textarea::placeholder { color: var(--muted); }
  textarea { min-height: 60px; resize: none; font-family: inherit; }

  .btn {
    width: 100%; padding: 14px; border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.03em;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    gap: 8px; min-height: 50px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-gps { background: var(--accent); color: #0f1117; }
  .btn-gps:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-save { background: var(--success); color: #fff; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-outline {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-size: 13px; padding: 10px;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid var(--border);
  }
  .section-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .badge { background: var(--accent); color: #0f1117; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

  #points-list { display: flex; flex-direction: column; gap: 8px; }

  .point-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 10px;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .point-card:hover, .point-card.active { border-color: var(--accent); background: var(--surface2); }

  .point-icon {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 12px; color: #0f1117; font-weight: 700;
  }
  .point-info { flex: 1; min-width: 0; }
  .point-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .point-coords { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-top: 2px; }
  .point-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .point-note { font-size: 12px; color: var(--muted); margin-top: 4px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .point-del { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; font-size: 20px; line-height: 1; flex-shrink: 0; transition: color 0.15s; }
  .point-del:hover { color: var(--danger); }

  .empty-state { text-align: center; padding: 30px 0; color: var(--muted); font-size: 13px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 20px; font-size: 13px; color: var(--text);
    z-index: 9999; transition: transform 0.3s ease; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  .map-container { position: relative; }
  #layer-toggle {
    position: absolute; top: 10px; right: 10px; z-index: 800;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; font-size: 12px; color: var(--text);
    cursor: pointer; font-weight: 600;
  }

  .leaflet-popup-content-wrapper {
    background: var(--surface) !important; color: var(--text) !important;
    border: 1px solid var(--border) !important; border-radius: var(--radius) !important; box-shadow: none !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.8s linear infinite; display: inline-block; }
</style>
</head>
<body>

<div id="header">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    <circle cx="12" cy="12" r="8" opacity="0.3"/>
  </svg>
  <h1>GeoCaptura Campo</h1>
  <div id="db-status">
    <div id="db-dot"></div>
    <span id="db-txt">conectando...</span>
  </div>
</div>

<div class="map-container">
  <div id="map"></div>
  <button id="layer-toggle" onclick="toggleLayer()">🗺 Mapa</button>
</div>

<div id="panel">

  <div class="gps-status" id="gps-status">
    <div class="dot"></div>
    <span id="gps-text">Sin señal GPS — presiona Capturar</span>
  </div>

  <div class="coords-row">
    <div class="coord-box"><label>Latitud</label><span id="lat-val">—</span></div>
    <div class="coord-box"><label>Longitud</label><span id="lng-val">—</span></div>
  </div>
  <div class="coords-row">
    <div class="coord-box"><label>Precisión (m)</label><span id="acc-val">—</span></div>
    <div class="coord-box"><label>Altitud (m)</label><span id="alt-val">—</span></div>
  </div>

  <button class="btn btn-gps" id="btn-gps" onclick="captureGPS()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    </svg>
    <span id="btn-gps-txt">Capturar mi posición GPS</span>
  </button>

  <input type="text" id="point-name" placeholder="Nombre del punto (ej: Vértice 1, Esquina norte...)" maxlength="80">
  <textarea id="point-notes" placeholder="Notas opcionales (descripción, observaciones...)" rows="2"></textarea>

  <button class="btn btn-save" id="btn-save" onclick="savePoint()" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
    </svg>
    Guardar punto en la nube
  </button>

  <div class="btn-row">
    <button class="btn btn-outline" onclick="exportGeoJSON()">⬇ GeoJSON</button>
    <button class="btn btn-outline" onclick="exportCSV()">⬇ CSV</button>
  </div>

  <div style="margin-top:4px">
    <div class="section-header">
      <h2>Puntos en la nube</h2>
      <span class="badge" id="badge-count">0</span>
    </div>
    <div style="height:12px"></div>
    <div id="points-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// ── Firebase config ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyC1UR6zN4sZJSxBv87Xv6V3cas_Tnf6rDs",
  authDomain: "geovisor-campo.firebaseapp.com",
  databaseURL: "https://geovisor-campo-default-rtdb.firebaseio.com",
  projectId: "geovisor-campo",
  storageBucket: "geovisor-campo.firebasestorage.app",
  messagingSenderId: "25977903170",
  appId: "1:25977903170:web:fcfbddde41ec05fbd4b5db"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const puntosRef = db.ref('puntos');

// ── Estado ────────────────────────────────────────────────────
let currentPos = null;
let points = [];       // array local sincronizado con Firebase
let markerMap = {};    // fbKey -> leaflet marker
let isSat = true;

// ── Mapa ──────────────────────────────────────────────────────
const streetLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap, CartoDB', maxZoom: 20
});
const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'ESRI World Imagery', maxZoom: 20
});
const map = L.map('map', { center: [6.2442, -75.5812], zoom: 15, zoomControl: true, layers: [satLayer] });

function toggleLayer() {
  isSat = !isSat;
  if (isSat) { map.removeLayer(streetLayer); map.addLayer(satLayer); document.getElementById('layer-toggle').textContent = '🗺 Mapa'; }
  else { map.removeLayer(satLayer); map.addLayer(streetLayer); document.getElementById('layer-toggle').textContent = '🛰 Sat'; }
}

// ── Firebase: escucha en tiempo real ─────────────────────────
puntosRef.on('value', snapshot => {
  // Limpiar marcadores existentes
  Object.values(markerMap).forEach(m => m.remove());
  markerMap = {};
  points = [];

  const data = snapshot.val();
  if (data) {
    Object.entries(data).forEach(([key, p]) => {
      p._key = key;
      points.push(p);
    });
    // Ordenar por timestamp
    points.sort((a, b) => a.id - b.id);
    points.forEach((p, i) => addMarker(p, i));
  }
  renderList();
  setDbStatus(true);
}, err => {
  setDbStatus(false);
  showToast('Error de conexión con Firebase', 'error');
});

function setDbStatus(ok) {
  const dot = document.getElementById('db-dot');
  const txt = document.getElementById('db-txt');
  dot.className = ok ? 'on' : 'err';
  txt.textContent = ok ? 'nube ✓' : 'sin conexión';
}

// ── Marcadores ────────────────────────────────────────────────
function makeIcon(num) {
  return L.divIcon({
    className: '',
    html: `<div style="background:#f59e0b;width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #0f1117;box-shadow:0 2px 8px rgba(0,0,0,0.5)"><div style="transform:rotate(45deg);width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#0f1117;font-size:11px;font-weight:700">${num}</div></div>`,
    iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -32]
  });
}

function addMarker(p, idx) {
  const m = L.marker([p.lat, p.lng], { icon: makeIcon(idx + 1) })
    .addTo(map)
    .bindPopup(`
      <div style="font-family:-apple-system,sans-serif;min-width:170px">
        <b style="font-size:14px;color:#f59e0b">${escHtml(p.name)}</b><br>
        <span style="font-size:11px;font-family:monospace;color:#8b90a0">${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}</span><br>
        ${p.alt ? `<span style="font-size:11px;color:#8b90a0">Alt: ${p.alt.toFixed(1)} m</span><br>` : ''}
        <span style="font-size:11px;color:#8b90a0">Precisión: ±${p.acc.toFixed(0)} m</span>
        ${p.notes ? `<br><em style="font-size:12px;color:#bbb">${escHtml(p.notes)}</em>` : ''}
        <br><span style="font-size:10px;color:#666">${p.time}</span>
        ${p.operador ? `<br><span style="font-size:11px;color:#aaa">👤 ${escHtml(p.operador)}</span>` : ''}
      </div>`);
  markerMap[p._key] = m;
}

// ── GPS ───────────────────────────────────────────────────────
function captureGPS() {
  const btn = document.getElementById('btn-gps');
  const txt = document.getElementById('btn-gps-txt');
  const status = document.getElementById('gps-status');
  if (!navigator.geolocation) { showToast('Tu dispositivo no soporta GPS', 'error'); return; }
  btn.disabled = true;
  txt.innerHTML = '<span class="spin">⟳</span> Obteniendo señal...';
  status.className = 'gps-status';
  document.getElementById('gps-text').textContent = 'Buscando señal GPS...';
  navigator.geolocation.getCurrentPosition(
    pos => {
      currentPos = pos.coords;
      document.getElementById('lat-val').textContent = pos.coords.latitude.toFixed(6);
      document.getElementById('lng-val').textContent = pos.coords.longitude.toFixed(6);
      document.getElementById('acc-val').textContent = pos.coords.accuracy ? pos.coords.accuracy.toFixed(0) : '—';
      document.getElementById('alt-val').textContent = pos.coords.altitude ? pos.coords.altitude.toFixed(1) : 'N/D';
      status.className = 'gps-status active';
      document.getElementById('gps-text').textContent = `Señal OK · ±${pos.coords.accuracy.toFixed(0)} m`;
      map.flyTo([pos.coords.latitude, pos.coords.longitude], Math.max(map.getZoom(), 17), { animate: true, duration: 1.2 });
      if (window._posMarker) window._posMarker.remove();
      window._posMarker = L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
        radius: 9, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.5, weight: 2
      }).addTo(map);
      btn.disabled = false;
      txt.textContent = 'Actualizar posición GPS';
      document.getElementById('btn-save').disabled = false;
      showToast(`✓ Posición capturada — ±${pos.coords.accuracy.toFixed(0)} m`, 'success');
    },
    err => {
      btn.disabled = false;
      txt.textContent = 'Capturar mi posición GPS';
      status.className = 'gps-status error';
      const msgs = { 1: 'Permiso GPS denegado. Habilítalo en el navegador.', 2: 'Sin señal. Sal al exterior e intenta de nuevo.', 3: 'Tiempo agotado. Intenta de nuevo.' };
      document.getElementById('gps-text').textContent = msgs[err.code] || 'Error GPS';
      showToast(msgs[err.code] || 'Error GPS', 'error');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

// ── Guardar punto en Firebase ─────────────────────────────────
function savePoint() {
  if (!currentPos) { showToast('Primero captura tu posición GPS', 'error'); return; }
  const name = document.getElementById('point-name').value.trim();
  if (!name) { document.getElementById('point-name').focus(); showToast('Escribe un nombre para el punto', 'error'); return; }
  const now = new Date();
  const p = {
    id: Date.now(),
    name,
    notes: document.getElementById('point-notes').value.trim(),
    lat: currentPos.latitude,
    lng: currentPos.longitude,
    acc: currentPos.accuracy,
    alt: currentPos.altitude || null,
    time: now.toLocaleString('es-CO', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }),
    operador: navigator.userAgent.includes('Mobile') ? 'Campo' : 'Oficina'
  };

  puntosRef.push(p)
    .then(() => {
      document.getElementById('point-name').value = '';
      document.getElementById('point-notes').value = '';
      document.getElementById('btn-save').disabled = true;
      currentPos = null;
      document.getElementById('gps-status').className = 'gps-status';
      document.getElementById('gps-text').textContent = 'Punto guardado en la nube ✓';
      document.getElementById('lat-val').textContent = '—';
      document.getElementById('lng-val').textContent = '—';
      document.getElementById('acc-val').textContent = '—';
      document.getElementById('alt-val').textContent = '—';
      showToast(`✓ "${p.name}" guardado en la nube`, 'success');
    })
    .catch(() => showToast('Error al guardar. Verifica tu conexión.', 'error'));
}

// ── Eliminar punto de Firebase ────────────────────────────────
function deletePoint(key, name) {
  if (!confirm(`¿Eliminar "${name}"?\nEsto lo borrará para todos.`)) return;
  db.ref('puntos/' + key).remove()
    .then(() => showToast('Punto eliminado'))
    .catch(() => showToast('Error al eliminar', 'error'));
}

// ── Foco en mapa ──────────────────────────────────────────────
function focusPoint(key) {
  const p = points.find(x => x._key === key);
  if (!p) return;
  map.flyTo([p.lat, p.lng], 18, { animate: true, duration: 0.8 });
  if (markerMap[key]) markerMap[key].openPopup();
  document.querySelectorAll('.point-card').forEach(el => el.classList.toggle('active', el.dataset.key === key));
}

// ── Render lista ──────────────────────────────────────────────
function renderList() {
  const n = points.length;
  document.getElementById('badge-count').textContent = n;
  const list = document.getElementById('points-list');
  if (!n) {
    list.innerHTML = '<div class="empty-state">📍 Sin puntos aún<br><small>El cliente captura en campo y aparecen aquí al instante</small></div>';
    return;
  }
  list.innerHTML = points.map((p, i) => `
    <div class="point-card" data-key="${p._key}" onclick="focusPoint('${p._key}')">
      <div class="point-icon">${i + 1}</div>
      <div class="point-info">
        <div class="point-name">${escHtml(p.name)}</div>
        <div class="point-coords">${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}</div>
        <div class="point-time">${p.time} · ±${p.acc.toFixed(0)} m${p.alt ? ` · Alt ${p.alt.toFixed(1)} m` : ''}</div>
        ${p.notes ? `<div class="point-note">${escHtml(p.notes)}</div>` : ''}
      </div>
      <button class="point-del" title="Eliminar" onclick="event.stopPropagation();deletePoint('${p._key}','${escHtml(p.name)}')">×</button>
    </div>`).join('');
}

// ── Exportar ──────────────────────────────────────────────────
function exportGeoJSON() {
  if (!points.length) { showToast('No hay puntos para exportar', 'error'); return; }
  const gj = {
    type: 'FeatureCollection',
    features: points.map(p => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [p.lng, p.lat, p.alt || 0] },
      properties: { nombre: p.name, notas: p.notes || '', precision_m: p.acc, altitud_m: p.alt || null, fecha: p.time }
    }))
  };
  download('puntos_campo.geojson', JSON.stringify(gj, null, 2), 'application/json');
  showToast('GeoJSON exportado ✓', 'success');
}

function exportCSV() {
  if (!points.length) { showToast('No hay puntos para exportar', 'error'); return; }
  const rows = ['N,Nombre,Latitud,Longitud,Altitud_m,Precision_m,Notas,Fecha',
    ...points.map((p, i) => `${i+1},"${p.name}",${p.lat.toFixed(7)},${p.lng.toFixed(7)},${p.alt ? p.alt.toFixed(2) : ''},${p.acc.toFixed(1)},"${p.notes || ''}","${p.time}"`)];
  download('puntos_campo.csv', rows.join('\n'), 'text/csv');
  showToast('CSV exportado ✓', 'success');
}

function download(fn, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF' + content], { type }));
  a.download = fn; a.click();
}

// ── Utilidades ────────────────────────────────────────────────
function escHtml(t) {
  if (!t) return '';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3000);
}
</script>
